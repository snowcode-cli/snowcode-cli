name: Publish NPM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: publish-npm-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Check npm version availability
        id: npm_check
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${PACKAGE_NAME}@${PACKAGE_VERSION} is already on npm. Skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip duplicate publish
        if: steps.npm_check.outputs.already_published == 'true'
        run: |
          echo "Nothing to publish: ${{ steps.npm_check.outputs.package_name }}@${{ steps.npm_check.outputs.package_version }} already exists."

      - name: Publish to npm
        if: steps.npm_check.outputs.already_published != 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set registry https://registry.npmjs.org/
          if [ -n "${NODE_AUTH_TOKEN}" ]; then
            npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}"
            npm publish --provenance --access public
          else
            npm publish --provenance --access public
          fi
